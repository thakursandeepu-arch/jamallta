<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">

  <meta charset="UTF-8">
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0f1e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Jamallta">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/brand/jamallta-films-luxury-logo-192.png">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="48x48" href="/assets/brand/jamallta-films-luxury-logo-48.png">
  <link rel="stylesheet" href="customer-chet.css">
  <script src="/assets/pwa.js" defer></script>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<header class="topbar">
<button id="backChatBtn" class="icon-btn">←</button>
  <div class="title-wrap"><img class="chat-logo" src="/assets/brand/jamallta-films-luxury-logo-192.png" alt="Jamallta Films logo"><div><div class="title">Jamallta Films</div>
    <div class="subtitle">Online</div></div></div><button id="homeBtn" class="icon-btn">🏠</button>
</header>

<!-- ===== CHAT ===== -->
<main class="chat-area">
  <div id="messages" class="messages"></div>
</main>

<!-- ===== INPUT ===== -->
<footer class="input-bar">
  <label for="fileInput" class="attach-btn">📎</label>
  <input type="file" id="fileInput"
    accept="image/*,video/*,.pdf,.zip,.rar,.doc,.docx,.xls,.xlsx"
    hidden />

  <input id="msgInput" placeholder="Type a message…" />
  <button id="sendBtn" class="send-btn">➤</button>
</footer>

<script type="module" src="customer-chet.js"></script>
<script type="module" src="/login/assets/auth-guard.js?v=2"></script>
</body>
</html>
