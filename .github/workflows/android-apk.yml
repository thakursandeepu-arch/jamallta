name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "android-app/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk ../Jamallta-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jamallta-debug-apk
          path: Jamallta-debug.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Jamallta Android APK
          body: |
            Free direct-install Android APK for Jamallta.

            Download `Jamallta-debug.apk` on Android, allow "Install unknown apps" if prompted, then install.
          prerelease: true
          make_latest: true
          files: Jamallta-debug.apk
          fail_on_unmatched_files: true
          overwrite_files: true
