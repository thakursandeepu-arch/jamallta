<!doctype html>
<html lang="en-IN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#17120d">
  <title>Offline | Jamallta Films</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f8f7f2;
      color: #17120d;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.55;
    }
    main {
      width: min(100%, 460px);
      padding: 28px;
      border: 1px solid rgba(23, 18, 13, 0.14);
      border-radius: 8px;
      background: #fffdf8;
      box-shadow: 0 18px 42px rgba(23, 18, 13, 0.12);
    }
    h1 { margin: 0 0 10px; font-size: 1.7rem; }
    p { margin: 0 0 18px; color: #5d5147; }
    a {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      padding: 0 18px;
      border-radius: 999px;
      background: #17120d;
      color: #fffdf8;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>You are offline</h1>
    <p>Jamallta Films app is installed, but this page needs internet right now. Try again when your connection is back.</p>
    <a href="/">Open Home</a>
  </main>
</body>
</html>
